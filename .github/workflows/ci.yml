name: ci

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality checks
        run: pnpm ci:quality

  indexer-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run indexer smoke
        run: pnpm ci:indexer

  security:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install OpenGrep
        run: |
          curl -fsSL https://raw.githubusercontent.com/opengrep/opengrep/main/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$HOME/.opengrep/cli/latest" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          if [ -x "$HOME/.local/bin/opengrep" ]; then
            echo "OPENGREP_BIN=$HOME/.local/bin/opengrep" >> "$GITHUB_ENV"
          elif [ -x "$HOME/.opengrep/cli/latest/opengrep" ]; then
            echo "OPENGREP_BIN=$HOME/.opengrep/cli/latest/opengrep" >> "$GITHUB_ENV"
          elif [ -x "$HOME/.cargo/bin/opengrep" ]; then
            echo "OPENGREP_BIN=$HOME/.cargo/bin/opengrep" >> "$GITHUB_ENV"
          fi
          command -v opengrep || true

      - name: Run security scan
        run: pnpm ci:security

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: opengrep-sarif
          path: opengrep.sarif
          if-no-files-found: ignore
